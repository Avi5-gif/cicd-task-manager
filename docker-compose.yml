version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: task-backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
    depends_on:
      - mongodb
    restart: unless-stopped
    networks:
      - task-network

  frontend:
    build:
      context: ./frontend
    container_name: task-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - task-network

  mongodb:
    image: mongo:6.0
    container_name: task-mongodb
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - task-network

networks:
  task-network:
    name: task-network

volumes:
  mongo_data:
